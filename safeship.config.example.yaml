# safeship 설정 파일
# 이 파일을 safeship.config.yaml 로 복사한 후 값을 채우세요.
# safeship.config.yaml 은 반드시 .gitignore에 추가하세요 (토큰/키 포함).

# ─────────────────────────────
# 1. 정적 분석 (코드베이스 스캔)
# ─────────────────────────────
static:
  enabled: true
  path: "."   # 검사할 프로젝트 루트

# ─────────────────────────────
# 2. Supabase 런타임 검증
# ─────────────────────────────
supabase:
  enabled: false   # 실제 사용 시 true로 변경
  url: "https://xxxxx.supabase.co"
  anonKey: "eyJhbGciOi..."   # 공개 anon key (service_role 아님)

  # RLS 기본 방어 테스트할 테이블 목록
  tables:
    - users
    - posts
    - payments

  # ─────────────────────────────
  # 멀티테넌트 격리 테스트 (선택)
  # ─────────────────────────────
  # 같은 Supabase 프로젝트에 서로 다른 tenant_id를 가진 두 명의
  # 테스트 계정을 미리 만들어 두고, 각자 로그인해서 얻은 access_token을
  # 여기에 넣으세요.
  tenantTest:
    enabled: false

    userAToken: ""            # User A 의 access_token
    userBToken: ""            # User B 의 access_token (현재는 참고용)

    userATenantId: ""         # User A 가 소속된 tenant UUID
    userBTenantId: ""         # User B 가 소속된 tenant UUID (A 가 공격할 대상)

    # 테넌트 격리를 검증할 테이블. tenant_id 컬럼이 있어야 함
    tenantTables:
      - posts
      - payments

# ─────────────────────────────
# 3. 배포된 URL 의 HTTP 검증
# ─────────────────────────────
http:
  enabled: false
  url: "https://your-domain.com"
